<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kingdoms - WebXR Testszene</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>
  <a-scene
    webxr="requiredFeatures: local-floor; optionalFeatures: bounded-floor, hand-tracking, layers"
    renderer="antialias: true; colorManagement: true"
    shadow="type: pcfsoft"
    background="color: #87CEEB"
  >

    <!-- Assets -->
    <a-assets>
    </a-assets>

    <!-- Himmel -->
    <a-sky color="#87CEEB"></a-sky>

    <!-- Sonne / Licht -->
    <a-light type="directional"
      position="3 10 -5"
      intensity="1.2"
      cast-shadow="true"
      shadow-camera-left="-20"
      shadow-camera-right="20"
      shadow-camera-top="20"
      shadow-camera-bottom="-20">
    </a-light>
    <a-light type="ambient" intensity="0.5" color="#fff5e0"></a-light>

    <!-- Boden -->
    <a-plane
      position="0 0 0"
      rotation="-90 0 0"
      width="40"
      height="40"
      color="#4a7c3f"
      shadow="receive: true"
      material="roughness: 0.9; metalness: 0.0">
    </a-plane>

    <!-- Gitter-Raster auf dem Boden (zur Orientierung) -->
    <a-entity position="0 0.01 0" rotation="-90 0 0">
      <a-plane
        width="40"
        height="40"
        material="color: #3a6c2f; wireframe: true; opacity: 0.3; transparent: true">
      </a-plane>
    </a-entity>

    <!-- Zentrum-Marker -->
    <a-cylinder
      position="0 0.05 0"
      radius="0.1"
      height="0.1"
      color="#ffffff"
      opacity="0.8">
    </a-cylinder>

    <!-- Objekt 1: Roter Würfel -->
    <a-box
      position="-2 0.75 -3"
      width="1.5"
      height="1.5"
      depth="1.5"
      color="#e74c3c"
      shadow="cast: true; receive: true"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear">
    </a-box>

    <!-- Objekt 2: Blaue Kugel -->
    <a-sphere
      position="2 1 -3"
      radius="1"
      color="#3498db"
      shadow="cast: true; receive: true"
      animation="property: position; to: 2 1.8 -3; dir: alternate; loop: true; dur: 2000; easing: easeInOutSine">
    </a-sphere>

    <!-- Objekt 3: Gelber Zylinder -->
    <a-cylinder
      position="0 1 -4"
      radius="0.6"
      height="2"
      color="#f1c40f"
      shadow="cast: true; receive: true">
    </a-cylinder>

    <!-- Objekt 4: Grüner Kegel -->
    <a-cone
      position="-3.5 1 -2"
      radius-bottom="0.8"
      radius-top="0"
      height="2"
      color="#2ecc71"
      shadow="cast: true; receive: true">
    </a-cone>

    <!-- Objekt 5: Lila Torus -->
    <a-torus
      position="3.5 1.2 -2"
      radius="0.8"
      radius-tubular="0.2"
      color="#9b59b6"
      shadow="cast: true; receive: true"
      animation="property: rotation; to: 360 0 0; loop: true; dur: 4000; easing: linear">
    </a-torus>

    <!-- Wand / Hintergrundstruktur -->
    <a-box
      position="0 2 -8"
      width="16"
      height="4"
      depth="0.3"
      color="#8e6b3e"
      shadow="cast: true; receive: true">
    </a-box>

    <!-- Text-Label über Objekten -->
    <a-text
      value="WebXR Testszene"
      position="0 3.5 -5"
      align="center"
      color="#ffffff"
      width="6"
      font="https://cdn.aframe.io/fonts/Roboto-msdf.json">
    </a-text>

    <a-text
      value="Meta Quest 3"
      position="0 3 -5"
      align="center"
      color="#f0e68c"
      width="4"
      font="https://cdn.aframe.io/fonts/Roboto-msdf.json">
    </a-text>

    <!-- Kamera & Controller -->
    <a-entity id="rig" position="0 0 2">
      <a-camera
        id="camera"
        wasd-controls-enabled="true"
        look-controls="pointerLockEnabled: false">

        <!-- Fadenkreuz für Desktop-Test -->
        <a-cursor
          fuse="false"
          material="color: white; shader: flat"
          geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.015"
          position="0 0 -1">
        </a-cursor>
      </a-camera>

      <!-- Meta Quest 3 Controller (links) -->
      <a-entity
        id="leftHand"
        oculus-touch-controls="hand: left"
        laser-controls="hand: left">
      </a-entity>

      <!-- Meta Quest 3 Controller (rechts) -->
      <a-entity
        id="rightHand"
        oculus-touch-controls="hand: right"
        laser-controls="hand: right">
      </a-entity>
    </a-entity>

  </a-scene>
</body>
</html>
