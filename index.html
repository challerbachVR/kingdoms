<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Kingdoms – Kesselstadt</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <style>body { margin: 0; overflow: hidden; }</style>

  <!-- Prozedurale Texturen + tex-Komponente -->
  <script src="js/textures.js"></script>
  <!-- Web Audio Sound-Engine -->
  <script src="js/sounds.js"></script>
  <!-- Tag/Nacht-System, Zahnräder, Dampf -->
  <script src="js/daynight.js"></script>
  <!-- VR Controller-Navigation -->
  <script src="js/navigation.js"></script>
  <!-- NPCs, Tiere, Vögel -->
  <script src="js/npcs.js"></script>
  <!-- Kesselstadt-Szene -->
  <script src="scenes/kesselstadt.js"></script>
</head>
<body>
<script>initTextures();</script>

<a-scene
  webxr="requiredFeatures: local-floor; optionalFeatures: bounded-floor, hand-tracking"
  renderer="antialias:true;colorManagement:true;physicallyCorrectLights:true"
  shadow="type:pcfsoft;autoUpdate:true"
  daynight="mode:day"
  kesselstadt-scene
  id="scene">

  <!-- ═══════════════════ LICHT ═══════════════════ -->
  <a-entity id="sun" position="5 12 -8"
    light="type:directional;intensity:1.1;color:#fff5cc;castShadow:true;
           shadowCameraLeft:-40;shadowCameraRight:40;shadowCameraTop:40;shadowCameraBottom:-40;
           shadowMapWidth:2048;shadowMapHeight:2048">
  </a-entity>
  <a-entity id="ambLight" light="type:ambient;intensity:0.7;color:#fff8f0"></a-entity>

  <!-- ═══════════════════ SPIELER-RIG ═══════════════════ -->
  <a-entity id="rig" position="0 0 10"
    vr-movement
    vr-teleport>
    <a-camera id="camera" wasd-controls="acceleration:20" look-controls>
      <a-cursor
        raycaster="objects: .ui-btn"
        fuse="false"
        material="color:white;shader:flat;opacity:0.8"
        geometry="primitive:ring;radiusInner:0.01;radiusOuter:0.015"
        position="0 0 -1">
      </a-cursor>
    </a-camera>
    <!-- Linke Hand: Bewegung + Teleport -->
    <a-entity id="leftHand" oculus-touch-controls="hand:left"></a-entity>
    <!-- Rechte Hand: Snap-Turn + UI-Laser -->
    <a-entity id="rightHand" oculus-touch-controls="hand:right"
      laser-controls="hand:right" raycaster="objects:.ui-btn;far:10">
    </a-entity>
  </a-entity>

</a-scene>
</body>
</html>
